<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Meu inventário</h1>
    <table>
        <thread>
            <tr><th>ID</th><th>Nome</th><th>Categoria</th><th>Quantidade</th></tr>
        </thread>

        <tbody>
            {{TABELA}}
        </tbody>

    </table>

    <hr>
    <h2>Adicionar novo item</h2>
    <form action="/adicionar" method="post">
        <label for="nome">Nome: <input type="text" name="nome" required></label><br>
        <label for="categoria">Categoria: <input type="text" name="categoria" required></label><br>
        <label for="quantidade">Quantidade: <input type="number" name="quantidade" required></label><br>
        <button type="submit">Salvar no inventário</button>
    </form>

</body>
</html>
